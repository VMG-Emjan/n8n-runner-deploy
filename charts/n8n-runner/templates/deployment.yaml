apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n-runner.fullname" . }}
  labels:
    {{- include "n8n-runner.labels" . | nindent 4 }}
spec:
  # n8n uses SQLite on a RWO volume — a single writer only. Do not scale >1 without external DB.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "n8n-runner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "n8n-runner.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the secret changes so a new encryption key is picked up intentionally.
        checksum/secret: {{ toJson .Values.secret.data | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.n8n.port }}
              protocol: TCP
          env:
            - name: N8N_HOST
              value: {{ .Values.n8n.host | quote }}
            - name: N8N_PORT
              value: {{ .Values.n8n.port | quote }}
            - name: N8N_PROTOCOL
              value: {{ .Values.n8n.protocol | quote }}
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: N8N_ENCRYPTION_KEY
            {{- range $k, $v := .Values.n8n.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readinessInitialDelaySeconds }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.livenessInitialDelaySeconds }}
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "n8n-runner.fullname" . }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
